# =============================================
# 文件上传配置
# =============================================
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
# 分片大小: 5MB
upload.chunk-size=5242880
# 临时文件目录（使用系统临时目录，避免权限问题）
upload.temp-dir=${java.io.tmpdir}/ican-upload-chunks

# =============================================
# Kafka 消息队列配置
# =============================================
# Kafka 开关（设置为 true 启用 Kafka，false 禁用）
# 禁用时应用仍可正常运行，只是不使用消息队列
kafka.enabled=true
# Kafka 服务地址（本地开发通过虚拟机访问）
spring.kafka.bootstrap-servers=192.168.6.130:9093
# 允许 Kafka 连接失败时应用继续启动
spring.kafka.admin.fail-fast=false
# 生产者配置
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.batch-size=16384
spring.kafka.producer.buffer-memory=33554432
# 消费者配置
spring.kafka.consumer.group-id=ican-video-analysis-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.ican.project.model.dto,com.ican.project.kafka.message
spring.kafka.consumer.enable-auto-commit=false
# Kafka Topic 名称
kafka.topic.video-analysis=video-analysis-topic
kafka.topic.analysis-result=analysis-result-topic
