# =============================================
# 视频下载配置（yt-dlp）
# =============================================
# yt-dlp 可执行文件路径（Windows 开发环境：使用完整路径，避免 Spring Boot 进程 PATH 继承问题）
download.ytdlp-path=D:/yt-dlp/yt-dlp.exe
# 需要登录的平台（如 YouTube 会员视频），配置 cookies.txt 文件路径（Netscape 格式，可用浏览器插件导出）
# 注意：抖音已使用移动端 API 下载，无需配置 cookies
# download.cookies-file=D:/yt-dlp/cookies.txt
# 临时下载目录（Windows 开发环境）
download.temp-dir=${java.io.tmpdir}/ican-downloads

# =============================================
# 缩略图生成配置（FFmpeg）
# =============================================
# FFmpeg 可执行文件路径（Windows 开发环境：使用完整路径，避免 Spring Boot 进程 PATH 继承问题）
# 生产环境（Linux Docker）直接写 ffmpeg 即可
thumbnail.ffmpeg-path=C:/ProgramData/chocolatey/bin/ffmpeg.exe